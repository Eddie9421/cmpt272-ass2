<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="text/javascript" src="./js/main.js" defer></script>
    <link rel="icon" href="./assets/multimedia.png" />
    <title>Catalog Viewer</title>
  </head>
  <body class="bg-dark text-light">
    <header class="py-2">
      <div class="align-items-center d-flex gap-4 justify-content-center mb-3">
        <img
          src="./assets/multimedia.png"
          class="img-fluid"
          alt="A music icon, document icon, video icon, and photo icon next to each other"
        />
        <h1>Catalog Viewer</h1>
      </div>
      <p class="lead fs-3 text-center">Parse CSV files</p>
    </header>
    <main class="container-fluid p-4 text-dark">
      <form class="card mb-3 shadow-lg">
        <div class="card-body">
          <div class="container-fluid">
            <h2 class="card-title mb-3">Catalog Controls</h2>
            <div class="mb-2 row gy-2">
              <div class="col-12 col-lg-6">
                <label for="upload-csv" class="form-label">Upload CSV</label>
                <input
                  type="file"
                  id="upload-csv"
                  accept=".csv"
                  name="upload-csv"
                  class="form-control"
                />
              </div>
              <div class="col">
                <label for="type" class="form-label">Type</label>
                <select name="item-type" id="type" class="form-select">
                  <option value="all">All</option>
                  <option value="book">Book</option>
                  <option value="movie">Movie</option>
                  <option value="game">Game</option>
                  <option value="paper">Paper</option>
                </select>
              </div>
              <div class="col">
                <label for="sort" class="form-label">Sort</label>
                <select name="sort-option" id="sort" class="form-select">
                  <option value="none">None</option>
                  <option value="year-ascending">
                    Sort by year (ascending)
                  </option>
                  <option value="year-descending">
                    Sort by year (descending)
                  </option>
                  <option value="rating-ascending">
                    Sort by rating (ascending)
                  </option>
                  <option value="rating-descending">
                    Sort by rating (descending)
                  </option>
                </select>
              </div>
            </div>
            <p class="card-text d-flex justify-content-end">
              Upload a CSV to begin.
            </p>
          </div>
        </div>
      </form>
      <section>
        <div class="align-items-center d-flex justify-content-between">
          <h2 class="display-4">Your Catalog</h2>
          <p class="mb-0"><strong>0 items</strong></p>
        </div>
      </section>
    </main>
    <footer class="d-flex justify-content-between p-4">
      <p>CMPT 272</p>
      <p>Assignment 2</p>
    </footer>
  </body>
</html>
