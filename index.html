<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
      defer
    ></script>
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="text/javascript" src="./js/main.js" defer></script>
    <link rel="icon" href="./assets/multimedia.png" />
    <title>Catalog Viewer</title>
  </head>
  <body class="bg-dark text-light">
    <header class="border-bottom py-2">
      <div class="align-items-center d-flex gap-4 justify-content-center mb-3">
        <h1 class="display-1">Catalog Viewer</h1>
        <img
          src="./assets/multimedia.png"
          class="img-fluid"
          alt="A music icon, document icon, video icon, and photo icon next to each other"
        />
      </div>
      <p class="lead fs-3 text-center">Parse CSV files</p>
    </header>
    <main class="text-dark">
      <form>
        <label for="upload-csv">Upload CSV</label>
        <input type="file" id="csv-upload" accept=".csv" name="csv-upload" />
        <label for="type">Type</label>
        <select name="item-type" id="type">
          <option value="all">All</option>
          <option value="book">Book</option>
          <option value="movie">Movie</option>
          <option value="game">Game</option>
          <option value="paper">Paper</option>
        </select>
        <label for="sort">Sort</label>
        <select name="sort-option" id="sort">
          <option value="none">None</option>
          <option value="year-ascending">Sort by year (ascending)</option>
          <option value="year-descending">Sort by year (descending)</option>
          <option value="rating-ascending">Sort by rating (ascending)</option>
          <option value="rating-descending">Sort by rating (descending)</option>
        </select>
      </form>
    </main>
    <footer></footer>
  </body>
</html>
